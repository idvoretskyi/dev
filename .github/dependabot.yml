# Keep devcontainer dependencies up to date
version: 2
updates:
  # Monitor GitHub Actions — daily, security-critical supply-chain component
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Monitor Docker base images — daily, CVEs ship in base images
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
      include: "scope"
    groups:
      docker-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Monitor devcontainer features — daily, includes claude-code, node, github-cli, common-utils, sshd
  - package-ecosystem: "devcontainers"
    directory: "/.devcontainer"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "devcontainers"
    commit-message:
      prefix: "feat"
      include: "scope"
