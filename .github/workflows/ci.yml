name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Validate
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: .devcontainer/Dockerfile

      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "$tarball" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          ./gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: gitleaks.sarif
          category: security-analysis/gitleaks

      - name: Build Docker image
        run: docker build --pull -t dev-template:latest .devcontainer/

  test:
    runs-on: ubuntu-latest
    name: Test Devcontainer
    needs: build
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Test devcontainer functionality
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3
        with:
          push: never
          runCmd: |
            set -eu
            for cmd in python3 node npm gh opencode curl jq; do
              if ! command -v "$cmd" >/dev/null 2>&1; then
                echo "::error::$cmd is missing"
                exit 1
              fi
            done
            python3 --version
            node --version
            npm --version
            gh --version
            opencode --version
            curl --version | head -1
            jq --version
